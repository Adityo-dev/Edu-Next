<!-- components/badges/BlueVerifiedBadge.tsx -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- ফিউচারিস্টিক ইলেকট্রিক টেক ব্লু গ্রেডিয়েন্ট -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" /> <!-- Tech Blue -->
      <stop offset="100%" stop-color="#1D4ED8" /> <!-- Deep Royal Blue -->
    </linearGradient>
  </defs>
  
  <!-- ১২ কোণাবিশিষ্ট প্রফেশনাল ভেরিফাইড গিয়ার আর্কিটেকচার -->
  <path d="M50,5 L58,13 L69,11 L73,21 L84,23 L84,34 L93,40 L89,50 L93,60 L84,66 L84,77 L73,79 L69,89 L58,87 L50,95 L42,87 L31,89 L27,79 L16,77 L16,66 L7,60 L11,50 L7,40 L16,34 L16,23 L27,21 L31,11 L42,13 Z" fill="url(#blueGrad)" />
  
  <!-- ইনার গ্লো রিং (অ্যাকসেন্ট মিন্ট টাচ) -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#00F0C2" stroke-width="2" opacity="0.4" stroke-dasharray="4,4" />
  
  <!-- বোল্ড ক্রিস্পি হোয়াইট ভেরিফাইড টিকমার্ক -->
  <path d="M35,52 L45,61 L65,38" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
